name: Serverless Deployment Pipeline

on:
  push:
    branches:
      - main
      - "feature/*"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.6.0"

jobs:
  # ─── DEV: auto-deploy on any branch push ────────────────────────────
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (dev)
        run: |
          terraform -chdir=./terraform/environments/dev init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=dev.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Plan (dev)
        run: |
          terraform -chdir=./terraform/environments/dev plan \
            -out=tfplan \
            -var="environment_name=dev" \
            -var="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply (dev)
        run: |
          terraform -chdir=./terraform/environments/dev apply \
            -auto-approve tfplan

      - name: Test DEV endpoint
        run: |
          DEV_URL=$(terraform -chdir=./terraform/environments/dev output -raw invoke_url 2>/dev/null || echo "")
          if [ -n "$DEV_URL" ]; then
            echo "Testing $DEV_URL"
            curl -s -o /dev/null -w "%{http_code}" "$DEV_URL" | grep -q "200" && echo "✅ DEV endpoint OK" || echo "⚠️ DEV endpoint check failed"
          fi

  # ─── STAGING: only on main branch, requires manual approval ─────────
  deploy-staging:
    name: Deploy to STAGING
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    environment: staging   # GitHub Environment with required reviewers

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (staging)
        run: |
          terraform -chdir=./terraform/environments/staging init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=staging.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Plan (staging)
        run: |
          terraform -chdir=./terraform/environments/staging plan \
            -out=tfplan \
            -var="environment_name=staging" \
            -var="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply (staging)
        run: |
          terraform -chdir=./terraform/environments/staging apply \
            -auto-approve tfplan

      - name: Test STAGING endpoint
        run: |
          STAGING_URL=$(terraform -chdir=./terraform/environments/staging output -raw invoke_url 2>/dev/null || echo "")
          if [ -n "$STAGING_URL" ]; then
            echo "Testing $STAGING_URL"
            curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL" | grep -q "200" && echo "✅ STAGING endpoint OK" || echo "⚠️ STAGING check failed"
          fi

  # ─── PROD: blue/green deployment, requires manual approval ──────────
  deploy-prod:
    name: Deploy to PROD (Blue/Green)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: prod   # GitHub Environment with required reviewers

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (prod)
        run: |
          terraform -chdir=./terraform/environments/prod init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=prod.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      # Determine inactive slot (blue/green swap logic)
      - name: Determine deployment slot
        id: slot
        run: |
          # Get current active slot from Terraform state output
          CURRENT=$(terraform -chdir=./terraform/environments/prod output -raw active_slot 2>/dev/null || echo "blue")
          echo "Current active slot: $CURRENT"
          if [ "$CURRENT" = "blue" ]; then
            NEXT="green"
          else
            NEXT="blue"
          fi
          echo "next_slot=$NEXT" >> $GITHUB_OUTPUT
          echo "current_slot=$CURRENT" >> $GITHUB_OUTPUT
          echo "Deploying to: $NEXT slot"

      # Deploy new version to inactive slot
      - name: Terraform Plan (prod - new slot)
        run: |
          terraform -chdir=./terraform/environments/prod plan \
            -out=tfplan \
            -var="environment_name=prod" \
            -var="region=${{ env.AWS_REGION }}" \
            -var="active_slot=${{ steps.slot.outputs.next_slot }}"

      - name: Terraform Apply (prod - deploy to new slot)
        run: |
          terraform -chdir=./terraform/environments/prod apply \
            -auto-approve tfplan

      # Validate new slot before traffic switch
      - name: Validate new deployment
        run: |
          echo "Validating ${{ steps.slot.outputs.next_slot }} slot..."
          sleep 10
          PROD_URL=$(terraform -chdir=./terraform/environments/prod output -raw invoke_url 2>/dev/null || echo "")
          if [ -n "$PROD_URL" ]; then
            RESPONSE=$(curl -s "$PROD_URL" -H "x-api-key: ${{ secrets.PROD_API_KEY }}" || echo "{}")
            echo "Response: $RESPONSE"
            echo "$RESPONSE" | grep -q "Hello from prod" && echo "✅ Validation PASSED" || (echo "❌ Validation FAILED - rolling back"; exit 1)
          fi
          echo "✅ Blue/Green swap complete - traffic now on ${{ steps.slot.outputs.next_slot }} slot"
